apiVersion: apps/v1
kind: Deployment
metadata:
  name: dial-themes-otel-test
  labels:
    app: dial-themes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dial-themes
  template:
    metadata:
      labels:
        app: dial-themes
    spec:
      containers:
      - name: nginx
        image: ghcr.io/shearwater1978/dial-themes-otel:new-otel
        imagePullPolicy: Always

        # DEBUG: sleep вместо nginx - смотрим /tmp/*.conf!
        command: ["/bin/sh", "-c"]
        args: ["sleep 3600"]

        ports:
        - containerPort: 8080
          name: http

        env:
        # OTEL флаг — ВКЛЮЧАЕТ модуль!
        - name: ENABLE_OTEL_ON
          value: "on"
        - name: ENABLE_OTEL
          value: "true"
        
        # Ваши OTEL vars
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://alloy-otel.monitoring.svc.cluster.local:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_SERVICE_NAME
          value: "dial-themes-test"

        securityContext:
          runAsUser: 101
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]

        volumeMounts:
        - name: conf-d
          mountPath: /etc/nginx/conf.d
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /var/log/nginx

      volumes:
      - name: conf-d
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}

