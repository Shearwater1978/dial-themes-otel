name: Build Themes docker image
run-name: Build Themes docker image with Otel module 🚀
on:
  push:
    paths:
      - Dockerfile.otel
  workflow_dispatch:

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  BuildThemes:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io  # ← GHCR
      IMAGE_NAME: ${{ github.repository }}  # ghcr.io/Shearwater1978/dial-themes-otel[web:62]
    permissions:  # ← обязательно для GHCR push
      contents: read
      packages: write  # для публикации в Packages[web:72]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3  # ← свежая версия вместо хэша
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6  # ← свежая
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: Dockerfile.otel
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: USER_UID=1001
